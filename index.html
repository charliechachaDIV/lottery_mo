<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消費獎賞助手 - 排序優化版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f9; --danger: #d9534f; --success: #28a745; }
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        nav { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; padding: 15px; border: none; background: none; font-size: 1rem; cursor: pointer; color: #666; }
        nav button.active { color: var(--primary); font-weight: bold; border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .app-row { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid #eee; }
        .app-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .app-name { font-weight: bold; font-size: 1.1rem; }
        
        .voucher-slots { display: flex; gap: 8px; margin-bottom: 10px; }
        .slot { flex: 1; height: 45px; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; cursor: pointer; background: #fff; transition: 0.2s; }
        .slot.filled { border-style: solid; border-color: var(--primary); color: var(--primary); background: #e7f1ff; }
        /* 刪除小叉叉 */
        .slot.filled::after { content: '×'; position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        .btn-group { display: flex; gap: 5px; }
        .chip { padding: 10px 5px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 0.9rem; cursor: pointer; flex: 1; text-align: center; }
        .chip:active { background: #eee; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dash-item { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .v-amount { color: var(--danger); font-size: 1.2rem; font-weight: bold; display: block; }
        .s-amount { color: var(--success); font-size: 0.85rem; }
        .v-detail { font-size: 0.7rem; color: #999; margin-top: 4px; }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; margin-top: 10px; font-weight: bold; }
        .status { font-size: 0.7rem; color: #aaa; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

    <nav>
        <button id="nav-input" onclick="showPage('input')">輸入券數</button>
        <button id="nav-dash" onclick="showPage('dash')">查看看板</button>
    </nav>

    <div class="container">
        <div id="page-input" class="page">
            <div class="card">
                <h2 style="margin:0; display:flex; justify-content:space-between;">
                    更新本週紀錄 <small id="today-hint" style="color:var(--success); font-size:0.8rem;"></small>
                </h2>
                <div id="input-list"></div>
                <button class="btn-save" onclick="saveData()">儲存並統計明細</button>
            </div>
        </div>

        <div id="page-dash" class="page">
            <div class="card">
                <h2 style="margin-top:0">核銷看板 ($3倍門檻)</h2>
                <div class="dashboard" id="dashboard-grid"></div>
            </div>
        </div>
        <div id="user-info" class="status">載入中...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://najwaxbrovbzjqomakqh.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_SjL1VX7VoFzEX5tcYnMKsA_eE05FkNS';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 更新後的排序
        const apps = ['澳門中銀', '工銀e支付', 'MPay', '豐付寶', '支付寶(澳門)', 'UePay', 'LusoPay', '廣發支付'];
        const denominations = [10, 20, 50, 100, 200];
        let selection = {}; 
        let myToken = localStorage.getItem('lottery_token') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('lottery_token', myToken);

        const inputList = document.getElementById('input-list');
        const dashGrid = document.getElementById('dashboard-grid');

        apps.forEach(app => {
            selection[app] = [];
            inputList.innerHTML += `
                <div class="app-row">
                    <div class="app-info">
                        <span class="app-name">${app}</span>
                        <span id="total-${app}" style="color:var(--primary); font-weight:bold;">$0</span>
                    </div>
                    <div class="voucher-slots" id="slots-${app}"></div>
                    <div class="btn-group">
                        ${denominations.map(d => `<button class="chip" onclick="addVoucher('${app}', ${d})">${d}</button>`).join('')}
                    </div>
                </div>`;
            
            dashGrid.innerHTML += `
                <div class="dash-item" id="card-${app}">
                    <div class="app-name" style="font-size:0.8rem">${app}</div>
                    <span class="v-amount" id="v-${app}">$0</span>
                    <div class="s-amount">需花: <span id="s-${app}">$0</span></div>
                    <div class="v-detail" id="detail-${app}">無券</div>
                </div>`;
            renderSlots(app);
        });

        // 修正填入邏輯：從左往右排
        function renderSlots(app) {
            const container = document.getElementById(`slots-${app}`);
            container.innerHTML = '';
            // 永遠渲染 3 個格子
            for (let i = 0; i < 3; i++) {
                const val = selection[app][i]; // 依序取值
                const slot = document.createElement('div');
                slot.className = `slot ${val ? 'filled' : ''}`;
                slot.innerHTML = val ? `$${val}` : '';
                slot.onclick = () => removeVoucher(app, i);
                container.appendChild(slot);
            }
            updateCalculations(app);
        }

        function addVoucher(app, val) {
            if (selection[app].length < 3) {
                selection[app].push(val); // 增加到陣列末尾
                renderSlots(app);
            }
        }

        function removeVoucher(app, index) {
            if (selection[app][index] !== undefined) {
                selection[app].splice(index, 1); // 刪除指定位置並遞補
                renderSlots(app);
            }
        }

        function updateCalculations(app) {
            const total = selection[app].reduce((a, b) => a + b, 0);
            document.getElementById(`total-${app}`).innerText = `$${total}`;
            document.getElementById(`v-${app}`).innerText = `$${total}`;
            document.getElementById(`s-${app}`).innerText = `$${(total * 3).toFixed(0)}`;
            document.getElementById(`detail-${app}`).innerText = selection[app].length > 0 ? `明細: ${selection[app].join(', ')}` : '無券';
            document.getElementById(`card-${app}`).style.opacity = total > 0 ? "1" : "0.3";
        }

        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active');
            document.getElementById(`nav-${pageName}`).classList.add('active');
        }

        async function loadData() {
            const { data } = await _supabase.from('lottery_records').select('*').eq('user_token', myToken);
            if (data) {
                apps.forEach(app => selection[app] = []);
                data.forEach(item => {
                    if (selection[item.payment_tool].length < 3) {
                        selection[item.payment_tool].push(item.reward);
                    }
                });
                apps.forEach(app => renderSlots(app));
                document.getElementById('user-info').innerText = `系統偵測：星期${"日一二三四五六"[new Date().getDay()]} | ID: ${myToken}`;
            }
        }

        async function saveData() {
            const btn = event.currentTarget;
            btn.innerText = "儲存中...";
            const records = [];
            apps.forEach(app => {
                selection[app].forEach(val => {
                    records.push({ user_token: myToken, payment_tool: app, reward: val, amount_paid: 0 });
                });
            });
            await _supabase.from('lottery_records').delete().eq('user_token', myToken);
            if (records.length > 0) await _supabase.from('lottery_records').insert(records);
            btn.innerText = "儲存並統計明細";
            showPage('dash');
        }

        const day = new Date().getDay();
        if ([0, 5, 6].includes(day)) {
            showPage('input');
            document.getElementById('today-hint').innerText = "(週末輸入模式)";
        } else {
            showPage('dash');
        }
        loadData();
    </script>
</body>
</html>
