<script>
    const SUPABASE_URL = 'https://najwaxbrovbzjqomakqh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SjL1VX7VoFzEX5tcYnMKsA_eE05FkNS';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const apps = ['澳門中銀', '工銀e支付', 'MPay', '豐付寶', '支付寶(澳門)', 'UePay', 'LusoPay', '廣發支付'];
    const denominations = [10, 20, 50, 100, 200];

    let selection = {};           // { 'MPay': [{val:10, used:false}, ...] }
    let myToken = localStorage.getItem('lottery_token') || 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('lottery_token', myToken);

    const inputList = document.getElementById('input-list');
    const dashGrid = document.getElementById('dashboard-grid');

    // ==================== 關鍵函數：澳門期數自動計算 ====================
    function getMacauPeriodTag() {
        const now = new Date();
        const utcTime = now.getTime() + now.getTimezoneOffset() * 60000;
        const macauTime = new Date(utcTime + 8 * 3600000); // UTC+8
        macauTime.setHours(0, 0, 0, 0);

        const day = macauTime.getDay(); // 0=週日 ... 5=週五
        const daysToSubtract = (day - 5 + 7) % 7;
        macauTime.setDate(macauTime.getDate() - daysToSubtract);

        const y = macauTime.getFullYear();
        const m = String(macauTime.getMonth() + 1).padStart(2, '0');
        const d = String(macauTime.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // ==================== 初始化 ====================
    apps.forEach(app => {
        selection[app] = [];
        // 輸入頁
        inputList.innerHTML += `
            <div class="app-row">
                <div class="app-info">
                    <span class="app-name">${app}</span>
                    <span id="total-${app}" style="color:var(--primary); font-weight:bold;">$0</span>
                </div>
                <div class="voucher-slots" id="slots-${app}"></div>
                <div class="btn-group">
                    ${denominations.map(d => `<button class="chip" onclick="addVoucher('${app}', ${d})">${d}</button>`).join('')}
                </div>
            </div>`;
        // 看板頁
        dashGrid.innerHTML += `
            <div class="dash-item" id="card-${app}">
                <div class="app-name" style="font-size:0.8rem">${app}</div>
                <span class="v-amount" id="v-${app}">$0</span>
                <div class="s-amount">需花: <span id="s-${app}">$0</span></div>
                <div class="mini-slots" id="mini-${app}"></div>
            </div>`;
        renderInputSlots(app);
    });

    // ==================== A區：輸入頁 ====================
    function renderInputSlots(app) {
        const container = document.getElementById(`slots-${app}`);
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const item = selection[app][i];
            const slot = document.createElement('div');
            slot.className = `slot ${item ? 'filled' : ''}`;
            slot.innerHTML = item ? `$${item.val}` : '';
            if (item) slot.onclick = () => { selection[app].splice(i, 1); renderInputSlots(app); };
            container.appendChild(slot);
        }
        document.getElementById(`total-${app}`).innerText = 
            `$${selection[app].reduce((sum, v) => sum + v.val, 0)}`;
    }

    function addVoucher(app, val) {
        if (selection[app].length < 3) {
            selection[app].push({ val: val, used: false });
            renderInputSlots(app);
        }
    }

    // ==================== B區：看板頁 + 即時核銷 ====================
    function renderDashCard(app) {
        const container = document.getElementById(`mini-${app}`);
        container.innerHTML = '';

        const activeVouchers = selection[app].filter(v => !v.used);
        const activeTotal = activeVouchers.reduce((a, b) => a + b.val, 0);

        document.getElementById(`v-${app}`).innerText = `$${activeTotal}`;
        document.getElementById(`s-${app}`).innerText = `$${(activeTotal * 3).toFixed(0)}`;
        document.getElementById(`card-${app}`).style.opacity = activeTotal > 0 ? "1" : "0.4";

        selection[app].forEach((item, index) => {
            const mini = document.createElement('div');
            mini.className = `mini-slot ${item.used ? 'used' : ''}`;
            mini.innerText = `$${item.val}`;
            mini.onclick = () => toggleUsed(app, index);   // ← 立即寫入資料庫
            container.appendChild(mini);
        });
    }

    async function toggleUsed(app, slotIndex) {
        const item = selection[app][slotIndex];
        if (!item) return;

        const period = getMacauPeriodTag();
        const newPaid = item.used ? 0 : 1;
        item.used = !item.used;

        const { error } = await _supabase
            .from('lottery_records')
            .update({ amount_paid: newPaid })
            .eq('user_token', myToken)
            .eq('period_tag', period)
            .eq('payment_tool', app)
            .eq('slot_index', slotIndex);

        if (error) {
            console.error(error);
            item.used = !item.used; // 還原
            alert('⚠️ 核銷更新失敗，請稍後再試');
            return;
        }
        renderDashCard(app);
    }

    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`page-${pageName}`).classList.add('active');
        document.getElementById(`nav-${pageName}`).classList.add('active');

        if (pageName === 'dash') apps.forEach(app => renderDashCard(app));
    }

    // ==================== 資料存取（已完全符合 TODO） ====================
    async function loadData() {
        const period = getMacauPeriodTag();
        const { data, error } = await _supabase
            .from('lottery_records')
            .select('*')
            .eq('user_token', myToken)
            .eq('period_tag', period);

        if (error) {
            console.error(error);
            return;
        }

        const temp = {};
        (data || []).forEach(item => {
            if (!temp[item.payment_tool]) temp[item.payment_tool] = [];
            temp[item.payment_tool].push({
                val: item.reward,
                used: item.amount_paid === 1,
                slot_index: item.slot_index
            });
        });

        apps.forEach(app => {
            if (temp[app]) {
                temp[app].sort((a, b) => a.slot_index - b.slot_index); // 格子鎖定
                selection[app] = temp[app].map(({ val, used }) => ({ val, used }));
            } else {
                selection[app] = []; // 無資料 → 自動清空
            }
            renderInputSlots(app);
        });

        // UX 提示
        document.getElementById('today-hint').innerHTML = `本期 <strong>${period}</strong> <span style="color:var(--success)">✓</span>`;
        document.getElementById('user-info').innerText = `期數：${period} | ID: ${myToken}`;
    }

    async function saveData() {
        const btn = event.currentTarget;
        btn.innerText = "儲存中...";
        btn.disabled = true;

        const period = getMacauPeriodTag();

        // 只清除當前期數
        await _supabase
            .from('lottery_records')
            .delete()
            .eq('user_token', myToken)
            .eq('period_tag', period);

        const records = [];
        apps.forEach(app => {
            selection[app].forEach((item, index) => {
                records.push({
                    user_token: myToken,
                    payment_tool: app,
                    reward: item.val,
                    amount_paid: item.used ? 1 : 0,
                    period_tag: period,
                    slot_index: index
                });
            });
        });

        if (records.length > 0) {
            await _supabase.from('lottery_records').insert(records);
        }

        btn.innerText = "儲存明細";
        btn.disabled = false;
        showPage('dash');
    }

    // ==================== 啟動 ====================
    const day = new Date().getDay();
    if ([0, 5, 6].includes(day)) showPage('input');
    else showPage('dash');

    loadData();
</script>
