<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消費大獎賞抽獎紀錄</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #eee; }
        input { width: 80%; padding: 5px; text-align: center; border: 1px solid #ddd; }
        .total-row { background-color: #fff9c4; font-weight: bold; }
        .status { font-size: 0.8em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>消費大獎賞抽獎紀錄</h2>
    <div id="user-info" class="status">載入中...</div>

    <table>
        <thead>
            <tr>
                <th>支付工具</th>
                <th>實付金額</th>
                <th>抽到回饋</th>
            </tr>
        </thead>
        <tbody id="record-table">
            </tbody>
        <tfoot>
            <tr class="total-row">
                <td>總計</td>
                <td id="total-paid">0</td>
                <td id="total-reward">0</td>
            </tr>
        </tfoot>
    </table>

    <button onclick="saveAll()">手動儲存全部</button>
    <p class="status">* 資料會自動儲存在雲端，換瀏覽器資料將不互通。</p>

<script>
        // --- 1. 連線資訊 ---
        const SUPABASE_URL = 'https://najwaxbrovbzjqomakqh.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_SjL1VX7VoFzEX5tcYnMKsA_eE05FkNS';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. 處理匿名身份 ---
        let myToken = localStorage.getItem('lottery_token');
        if (!myToken) {
            myToken = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('lottery_token', myToken);
        }
        document.getElementById('user-info').innerText = '您的匿名 ID: ' + myToken;

        // --- 3. 更新後的支付工具列表 (對應圖片) ---
        const tools = [
            '澳門中銀', 
            '工銀e支付', 
            '豐付寶', 
            'LusoPay', 
            'MPay', 
            '支付寶(澳門)', 
            'UePay', 
            '廣發支付'
        ];

        // --- 4. 初始化表格 ---
        const tbody = document.getElementById('record-table');
        tools.forEach(tool => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${tool}</td>
                <td><input type="number" class="paid" data-tool="${tool}" onchange="calculateTotal()" placeholder="0"></td>
                <td><input type="number" class="reward" data-tool="${tool}" onchange="calculateTotal()" placeholder="0"></td>
            `;
            tbody.appendChild(row);
        });

        // --- 5. 從資料庫讀取舊紀錄 ---
        async function loadData() {
            try {
                const { data, error } = await _supabase
                    .from('lottery_records')
                    .select('*')
                    .eq('user_token', myToken);

                if (data && data.length > 0) {
                    data.forEach(item => {
                        const paidInput = document.querySelector(`.paid[data-tool="${item.payment_tool}"]`);
                        const rewardInput = document.querySelector(`.reward[data-tool="${item.payment_tool}"]`);
                        if (paidInput) paidInput.value = item.amount_paid;
                        if (rewardInput) rewardInput.value = item.reward;
                    });
                    calculateTotal();
                }
            } catch (e) {
                console.error("讀取失敗:", e);
            }
        }

        // --- 6. 計算總計 ---
        function calculateTotal() {
            let totalPaid = 0;
            let totalReward = 0;
            document.querySelectorAll('.paid').forEach(i => totalPaid += Number(i.value || 0));
            document.querySelectorAll('.reward').forEach(i => totalReward += Number(i.value || 0));
            
            document.getElementById('total-paid').innerText = totalPaid.toFixed(2);
            document.getElementById('total-reward').innerText = totalReward.toFixed(2);
        }

        // --- 7. 儲存全部資料 ---
        async function saveAll() {
            const records = [];
            tools.forEach(tool => {
                const paid = document.querySelector(`.paid[data-tool="${tool}"]`).value;
                const reward = document.querySelector(`.reward[data-tool="${tool}"]`).value;
                
                records.push({
                    user_token: myToken,
                    payment_tool: tool,
                    amount_paid: parseFloat(paid) || 0,
                    reward: parseFloat(reward) || 0
                });
            });

            await _supabase.from('lottery_records').delete().eq('user_token', myToken);
            const { error } = await _supabase.from('lottery_records').insert(records);

            if (error) alert('儲存失敗: ' + error.message);
            else alert('資料已同步至雲端！');
        }

        loadData();
    </script>
</body>
</html>
