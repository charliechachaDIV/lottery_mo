<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門消費獎賞看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background-color: #f8f9fa; color: #333; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin-top: 0; color: #007bff; border-left: 4px solid #007bff; padding-left: 10px; }
        
        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        th { font-size: 0.85rem; color: #777; font-weight: normal; }
        input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }

        /* B區：看板樣式 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dash-item { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #e0e0e0; }
        .app-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .amount-row { display: flex; justify-content: space-between; align-items: baseline; }
        .v-amount { color: #d9534f; font-size: 1.1rem; font-weight: bold; }
        .s-amount { color: #28a745; font-size: 0.85rem; }
        .label { font-size: 0.75rem; color: #999; }

        .btn-save { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .status { font-size: 0.75rem; color: #aaa; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>A區：更新券數 (APP 剩餘額度)</h2>
        <table>
            <thead>
                <tr>
                    <th>支付平台</th>
                    <th>券總面額 ($)</th>
                </tr>
            </thead>
            <tbody id="input-table">
                </tbody>
        </table>
        <button class="btn-save" onclick="saveData()">儲存並更新看板</button>
    </div>

    <div class="card">
        <h2>B區：核銷看板 (3倍核銷提示)</h2>
        <div class="dashboard" id="dashboard">
            </div>
    </div>

    <div id="user-info" class="status">正在同步雲端資料...</div>

    <script>
        // --- 1. 連線設定 ---
        const SUPABASE_URL = 'https://najwaxbrovbzjqomakqh.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_SjL1VX7VoFzEX5tcYnMKsA_eE05FkNS';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. 8大支付平台列表 ---
        const apps = ['澳門中銀', '工銀e支付', '豐付寶', 'LusoPay', 'MPay', '支付寶(澳門)', 'UePay', '廣發支付'];
        let myToken = localStorage.getItem('lottery_token') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('lottery_token', myToken);

        // --- 3. 初始化畫面 ---
        const inputTable = document.getElementById('input-table');
        const dashboard = document.getElementById('dashboard');

        apps.forEach(app => {
            // A區輸入框
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${app}</td><td><input type="number" class="v-input" data-app="${app}" placeholder="0" oninput="updateUI()"></td>`;
            inputTable.appendChild(tr);

            // B區卡片
            const div = document.createElement('div');
            div.className = 'dash-item';
            div.id = `dash-${app}`;
            div.innerHTML = `
                <div class="app-name">${app}</div>
                <div class="amount-row">
                    <div><span class="label">有券:</span> <span class="v-amount" id="v-${app}">0</span></div>
                    <div><span class="label">需花:</span> <span class="s-amount" id="s-${app}">0</span></div>
                </div>
            `;
            dashboard.appendChild(div);
        });

        // --- 4. 即時更新 UI 邏輯 ---
        function updateUI() {
            apps.forEach(app => {
                const val = parseFloat(document.querySelector(`input[data-app="${app}"]`).value) || 0;
                document.getElementById(`v-${app}`).innerText = `$${val}`;
                document.getElementById(`s-${app}`).innerText = `$${(val * 3).toFixed(1)}`; // 3倍核銷邏輯
                
                // 視覺回饋：如果沒券就變淡
                document.getElementById(`dash-${app}`).style.opacity = val > 0 ? "1" : "0.4";
            });
        }

        // --- 5. 雲端同步 (讀取) ---
        async function loadData() {
            const { data } = await _supabase.from('lottery_records').select('*').eq('user_token', myToken);
            if (data) {
                data.forEach(item => {
                    const input = document.querySelector(`input[data-app="${item.payment_tool}"]`);
                    if (input) input.value = item.reward;
                });
                updateUI();
                document.getElementById('user-info').innerText = '匿名 ID: ' + myToken + ' (同步完成)';
            }
        }

        // --- 6. 雲端同步 (儲存) ---
        async function saveData() {
            const records = apps.map(app => ({
                user_token: myToken,
                payment_tool: app,
                reward: parseFloat(document.querySelector(`input[data-app="${app}"]`).value) || 0,
                amount_paid: 0 // 這裡目前用不到，保留結構
            }));

            await _supabase.from('lottery_records').delete().eq('user_token', myToken);
            const { error } = await _supabase.from('lottery_records').insert(records);
            
            if (!error) alert('看板已更新並同步！');
            else alert('錯誤: ' + error.message);
        }

        loadData();
    </script>
</body>
</html>
