<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消費獎賞助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        
        /* 導航欄 */
        nav { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; padding: 15px; border: none; background: none; font-size: 1rem; cursor: pointer; color: #666; }
        nav button.active { color: var(--primary); font-weight: bold; border-bottom: 3px solid var(--primary); }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* 卡片樣式 */
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin-top: 0; display: flex; justify-content: space-between; }
        
        /* 輸入頁樣式 */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #f0f0f0; }
        input { width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }

        /* 看板頁樣式 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dash-item { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .app-name { font-size: 0.85rem; font-weight: bold; color: #555; }
        .v-amount { color: #d9534f; font-size: 1.2rem; font-weight: bold; display: block; }
        .s-amount { color: #28a745; font-size: 0.85rem; }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; margin-top: 10px; }
        .status { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 20px; }
        .day-tip { font-size: 0.8rem; font-weight: normal; color: #28a745; }
    </style>
</head>
<body>

    <nav>
        <button id="nav-input" onclick="showPage('input')">輸入券數</button>
        <button id="nav-dash" onclick="showPage('dash')">查看看板</button>
    </nav>

    <div class="container">
        <div id="page-input" class="page">
            <div class="card">
                <h2>更新本週紀錄 <span id="today-hint" class="day-tip"></span></h2>
                <table>
                    <tbody id="input-table"></tbody>
                </table>
                <button class="btn-save" onclick="saveData()">同步到雲端</button>
            </div>
        </div>

        <div id="page-dash" class="page">
            <div class="card">
                <h2>核銷進度 ($3倍門檻)</h2>
                <div class="dashboard" id="dashboard-grid"></div>
            </div>
        </div>

        <div id="user-info" class="status">讀取中...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://najwaxbrovbzjqomakqh.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_SjL1VX7VoFzEX5tcYnMKsA_eE05FkNS';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 8大平台
        const apps = ['澳門中銀', '工銀e支付', '豐付寶', 'LusoPay', 'MPay', '支付寶(澳門)', 'UePay', '廣發支付'];
        let myToken = localStorage.getItem('lottery_token') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('lottery_token', myToken);

        // --- 初始化 UI ---
        const inputTable = document.getElementById('input-table');
        const dashGrid = document.getElementById('dashboard-grid');

        apps.forEach(app => {
            // 建立輸入列
            inputTable.innerHTML += `<tr><td>${app}</td><td align="right"><input type="number" class="v-input" data-app="${app}" placeholder="0" oninput="updateCalculations()"> 元</td></tr>`;
            // 建立看板卡片
            dashGrid.innerHTML += `
                <div class="dash-item" id="card-${app}">
                    <div class="app-name">${app}</div>
                    <span class="v-amount" id="v-${app}">$0</span>
                    <div class="s-amount">需花: <span id="s-${app}">$0</span></div>
                </div>`;
        });

        function updateCalculations() {
            apps.forEach(app => {
                const val = parseFloat(document.querySelector(`input[data-app="${app}"]`).value) || 0;
                document.getElementById(`v-${app}`).innerText = `$${val}`;
                document.getElementById(`s-${app}`).innerText = `$${(val * 3).toFixed(0)}`;
                document.getElementById(`card-${app}`).style.opacity = val > 0 ? "1" : "0.3";
            });
        }

        // --- 分頁邏輯 ---
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`page-${pageName}`).classList.add('active');
            document.getElementById(`nav-${pageName}`).classList.add('active');
        }


        // --- 資料同步 ---
        async function loadData() {
            const { data } = await _supabase.from('lottery_records').select('*').eq('user_token', myToken);
            if (data) {
                data.forEach(item => {
                    const input = document.querySelector(`input[data-app="${item.payment_tool}"]`);
                    if (input) input.value = item.reward;
                });
                updateCalculations();
                document.getElementById('user-info').innerText = '雲端同步中 (ID: ' + myToken + ')';
            }
        }

        async function saveData() {
            const btn = event.target;
            btn.innerText = "儲存中...";
            const records = apps.map(app => ({
                user_token: myToken,
                payment_tool: app,
                reward: parseFloat(document.querySelector(`input[data-app="${app}"]`).value) || 0,
                amount_paid: 0
            }));

            await _supabase.from('lottery_records').delete().eq('user_token', myToken);
            const { error } = await _supabase.from('lottery_records').insert(records);
            
            btn.innerText = "同步到雲端";
            if (!error) {
                alert('已儲存！即將跳轉至看板。');
                showPage('dash');
            }
        }

    // --- 自動判定日期 ---
function initDefaultPage() {
    const now = new Date();
    const day = now.getDay(); 
    const dayNames = ["日", "一", "二", "三", "四", "五", "六"];
    const isWeekend = [0, 5, 6].includes(day);
    
    // 在狀態列顯示目前的判斷結果，讓你校對
    document.getElementById('user-info').innerText = 
        `系統時間：星期${dayNames[day]} | 匿名 ID: ${myToken}`;

    const hint = document.getElementById('today-hint');
    if (isWeekend) {
        hint.innerText = "(週末輸入模式)";
        showPage('input');
    } else {
        showPage('dash');
    }
}

        
        initDefaultPage();
        loadData();
    </script>
    

</body>
</html>
